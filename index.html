<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Yayoi Copilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: sans-serif; background: #1a1a2e; color: #eee; }

    #webview-area {
      flex: 1;
      border-right: 2px solid #333;
    }
    webview {
      width: 100%;
      height: 100%;
    }

    #side-panel {
      width: 340px;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    #status-badge {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      background: #2a2a4a;
      text-align: center;
    }
    #status-badge.running { background: #1a5c3a; }
    #status-badge.paused  { background: #7a4a00; }

    #prompt-input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #12122a;
      color: #eee;
      font-size: 14px;
      resize: none;
    }

    .btn {
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    #btn-execute { background: #3a6ea5; color: #fff; }
    #btn-pause   { background: #a57a00; color: #fff; }
    #btn-resume  { background: #2a7a4a; color: #fff; display: none; }
  </style>
</head>
<body>
  <div id="webview-area">
    <webview src="https://app.yayoi-kk.co.jp/" partition="persist:yayoi"></webview>
  </div>

  <div id="side-panel">
    <div id="status-badge">待機中 (IDLE)</div>
    <textarea id="prompt-input" placeholder="指示を入力（例：3行目の摘要を修正して）" rows="6"></textarea>
    <button class="btn" id="btn-execute">実行</button>
    <button class="btn" id="btn-pause">一時停止</button>
    <button class="btn" id="btn-resume">再開</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
