<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 { font-size: 13px; color: #9ab; }
    #status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #2a2a4a;
      color: #aab;
    }
    #status.running { background: #1a5c3a; color: #cfe; }
    #status.error { background: #7a1a1a; color: #fcc; }

    /* 現在地バー */
    .screenbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #2a2a4a;
      background: #16162c;
      font-size: 12px;
    }
    .screen-label { color: #678; font-size: 10px; }
    #screen { color: #9cf; font-weight: bold; }
    #screen.unknown { color: #fc8; }
    #screen.off { color: #889; font-weight: normal; }
    #catalog {
      margin-left: auto;
      background: none;
      border: 1px solid #2a2a4a;
      color: #89a;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 8px;
    }
    #open {
      background: #2a3a5a;
      border: none;
      color: #cde;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 8px;
    }
    #refresh {
      background: none;
      border: 1px solid #2a2a4a;
      color: #89a;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      padding: 1px 7px;
    }

    /* 会話エリア */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 88%;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #3a6ea5;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #23233f;
      border-bottom-left-radius: 3px;
    }
    .msg.assistant.error { background: #3a1f1f; color: #fcc; }
    .msg.assistant.stopped { background: #2f2a1f; color: #fe9; }

    /* 実行ログ（折りたたみ） */
    details.steps {
      align-self: stretch;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      font-size: 11px;
    }
    details.steps > summary {
      cursor: pointer;
      padding: 6px 10px;
      color: #789;
      user-select: none;
    }
    .steps-body {
      padding: 4px 10px 8px;
      font-family: monospace;
      line-height: 1.5;
    }
    .step { margin-bottom: 3px; color: #bcd; }
    .step .t { color: #567; margin-right: 5px; }

    /* 入力エリア */
    .composer {
      border-top: 1px solid #2a2a4a;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #task {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #12122a;
      color: #eee;
      font-size: 13px;
      resize: none;
      font-family: inherit;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .hint { font-size: 10px; color: #567; }
    #run {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      background: #3a6ea5;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    #run.stop { background: #a53a3a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>弥生会計コパイロット</h1>
    <span id="status">待機中</span>
  </div>

  <div class="screenbar">
    <span class="screen-label">現在地</span>
    <span id="screen">確認中…</span>
    <button id="catalog" title="訪れた画面の一覧を表示・コピー">履歴</button>
    <button id="open" title="弥生を開く（service_id付き）">弥生を開く</button>
    <button id="refresh" title="現在地を再判定">↻</button>
  </div>

  <div id="messages"></div>

  <div class="composer">
    <textarea id="task" rows="2" placeholder="指示を入力（例：仕訳帳を開いて最近の仕訳を5件報告して）"></textarea>
    <div class="row">
      <span class="hint">Enter で実行 / Shift+Enter で改行</span>
      <button id="run">実行</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
