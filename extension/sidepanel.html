<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-sunken: #f0f3f5;
      --border: #e2e8ee;
      --border-strong: #d3dbe3;
      --text: #1f2933;
      --text-sub: #6b7682;
      --text-faint: #97a2ad;
      --brand: #00a040;
      --brand-hover: #008a37;
      --brand-soft: #e6f5ec;
      --danger: #d64545;
      --danger-soft: #fdecec;
      --warn: #b7791f;
      --warn-soft: #fff7e6;
      --warn-border: #f0dcae;
      --shadow: 0 1px 2px rgba(20, 30, 40, 0.06), 0 1px 3px rgba(20, 30, 40, 0.05);
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header h1::before {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 5px;
      background: var(--brand);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
    }
    #status {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface-sunken);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    #status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }
    #status.running { background: var(--brand-soft); color: var(--brand-hover); }
    #status.running::before { animation: pulse 1.2s ease-in-out infinite; opacity: 1; }
    #status.error { background: var(--danger-soft); color: var(--danger); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 現画面バー */
    .screenbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .screen-label {
      color: var(--text-faint);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    #screen { color: var(--text); font-weight: 600; }
    #screen.unknown { color: var(--warn); }
    #screen.off { color: var(--text-faint); font-weight: 500; }

    .screenbar button {
      font-family: inherit;
      cursor: pointer;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      transition: background 0.12s, border-color 0.12s;
    }
    #refresh {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-sub);
      padding: 4px 8px;
    }
    #refresh:hover { background: var(--surface-sunken); border-color: var(--text-faint); }
    #open {
      margin-left: auto;
      background: var(--brand-soft);
      border: 1px solid transparent;
      color: var(--brand-hover);
      padding: 4px 10px;
    }
    #open:hover { background: #d7efe0; }

    /* 会話エリア */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #messages::-webkit-scrollbar { width: 8px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    #messages::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    .msg {
      max-width: 88%;
      padding: 9px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: var(--shadow);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .msg.assistant.error { background: var(--danger-soft); border-color: #f3c9c9; color: #a12f2f; }
    .msg.assistant.stopped { background: var(--warn-soft); border-color: var(--warn-border); color: #8a5d13; }

    /* 実行ログ（折りたたみ） */
    details.steps {
      align-self: stretch;
      background: var(--surface-sunken);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 11px;
      overflow: hidden;
    }
    details.steps > summary {
      cursor: pointer;
      padding: 8px 12px;
      color: var(--text-sub);
      font-weight: 600;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.steps > summary::-webkit-details-marker { display: none; }
    details.steps > summary::before {
      content: "▸";
      color: var(--text-faint);
      font-size: 10px;
      transition: transform 0.15s;
    }
    details.steps[open] > summary::before { transform: rotate(90deg); }
    .steps-body {
      padding: 2px 12px 10px 12px;
      font-family: ui-monospace, "SFMono-Regular", "Consolas", monospace;
      line-height: 1.6;
    }
    .step { margin-bottom: 2px; color: var(--text-sub); }
    .step .t { color: var(--text-faint); margin-right: 6px; font-size: 10px; }

    /* 確認ゲート（更新系の実行前） */
    .confirm {
      align-self: stretch;
      background: var(--warn-soft);
      border: 1px solid var(--warn-border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 12px;
      box-shadow: var(--shadow);
    }
    .confirm.confirmed { border-color: #b6e0c4; background: var(--brand-soft); }
    .confirm.cancelled { border-color: #e6c7c7; background: var(--danger-soft); opacity: 0.85; }
    .confirm-title { color: #8a5d13; font-weight: 700; margin-bottom: 8px; }
    .confirm.confirmed .confirm-title { color: var(--brand-hover); }
    .confirm.cancelled .confirm-title { color: var(--danger); }
    .confirm-lines {
      margin: 0 0 10px 4px;
      padding: 8px 10px;
      list-style: none;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      color: var(--text);
      line-height: 1.7;
    }
    .confirm-lines li { padding-left: 14px; position: relative; }
    .confirm-lines li::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 0.7em;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--warn);
    }
    .confirm-row { display: flex; gap: 8px; }
    .confirm-ok, .confirm-no {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.12s, opacity 0.12s;
    }
    .confirm-ok { background: var(--brand); color: #fff; }
    .confirm-ok:hover:not(:disabled) { background: var(--brand-hover); }
    .confirm-no { background: var(--surface); color: var(--text-sub); border: 1px solid var(--border-strong); }
    .confirm-no:hover:not(:disabled) { background: var(--surface-sunken); }
    .confirm-ok:disabled, .confirm-no:disabled { opacity: 0.45; cursor: default; }

    /* 入力エリア */
    .composer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #task {
      padding: 10px 11px;
      border-radius: 9px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      font-family: inherit;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    #task::placeholder { color: var(--text-faint); }
    #task:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .hint { font-size: 10px; color: var(--text-faint); }
    #run {
      padding: 8px 20px;
      border-radius: 9px;
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.12s;
    }
    #run:hover { background: var(--brand-hover); }
    #run.stop { background: var(--danger); }
    #run.stop:hover { background: #bf3838; }

    /* 音声入力ボタン */
    #mic {
      width: 34px;
      height: 34px;
      flex: none;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    #mic:hover { background: var(--surface-sunken); border-color: var(--text-faint); }
    #mic svg { width: 16px; height: 16px; }
    #mic.listening {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
      box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.5);
      animation: mic-pulse 1.3s ease-out infinite;
    }
    #mic[disabled] { opacity: 0.4; cursor: default; }
    @keyframes mic-pulse {
      0% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.45); }
      70% { box-shadow: 0 0 0 8px rgba(214, 69, 69, 0); }
      100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>弥生会計コパイロット</h1>
    <span id="status">待機中</span>
  </div>

  <div class="screenbar">
    <span class="screen-label">現画面</span>
    <span id="screen">確認中…</span>
    <button id="open" title="弥生を開く（service_id付き）">弥生を開く</button>
    <button id="refresh" title="現画面を再判定">↻</button>
  </div>

  <div id="messages"></div>

  <div class="composer">
    <textarea id="task" rows="2" placeholder="指示を入力（例：仕訳帳を開いて最近の仕訳を5件報告して）"></textarea>
    <div class="row">
      <button id="mic" title="音声入力（マイク）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"></rect>
          <path d="M5 11a7 7 0 0 0 14 0"></path>
          <line x1="12" y1="18" x2="12" y2="22"></line>
        </svg>
      </button>
      <span class="hint">Enter で実行 / Shift+Enter で改行</span>
      <button id="run">実行</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
